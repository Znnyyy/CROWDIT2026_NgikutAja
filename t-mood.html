<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-MOOD</title>
    <link rel="stylesheet" href="assets/CSS/output.css">
    <link rel="stylesheet" href="./assets/CSS/global.css">
</head>

<body>
    <!-- Navbar -->
     <nav class="bg-[#F0EEE9] flex justify-between px-15 items-center h-24 text-[#414944]">
        <div class="flex items-center gap-1">
            <img src="/assets/images/landing/logo.png" alt="Your-Friend" class="h-15 w-15" />
            <h1 class="text-3xl font-bold">Y-Friend</h1>
        </div>

        <ul class="flex gap-16 text-lg">
            <li>
                <a href="">Beranda</a>
            </li>
            <li>
                <a href="#">T-Mood</a>
            </li>
            <li>
                <a href="#">Mulai-Belajar</a>
            </li>
            <li>
                <a href="#">Suasana-Tenang</a>
            </li>
        </ul>

        <div class="flex gap-2">
            <img src="/assets/images/landing/globe.png" alt="globe" class="h-8 w-8" />
            <h2 class="text-lg font-semibold">Bahasa</h2>
        </div>
    </nav>

    <main>
        <section class="relative overflow-hidden bg-[#F6F5E9] min-h-screen">

            <!-- Glow Background -->
            <div class="absolute inset-0
        bg-[radial-gradient(circle_at_center,#F5F18C_0%,transparent_60%)]
        opacity-70">
            </div>

            <div class="relative z-10 container mx-auto px-10 py-16">

                <!-- Title -->
                <h2 class="text-center text-2xl font-bold text-[#33433B] mb-16">
                    Bagaimana perasaanmu hari ini?
                </h2>

                <div class="grid grid-cols-[1fr_1fr] items-center">

                    <!-- Left Side -->
                    <div class="relative flex justify-center items-center">

                        <!-- Blur Character -->
                        <img src="./assets/images/pink.png" alt="" class="absolute left-0 w-32 blur-[6px] opacity-80">

                        <!-- Main Character Glow -->
                        <div class="absolute w-[350px] h-[350px]
                    bg-yellow-300/40
                    rounded-full
                    blur-[80px]">
                        </div>

                        <!-- Main Character -->
                        <img src="./assets/images/happy.png" alt="" class="relative z-10 w-[260px]">
                    </div>

                    <!-- Right Side -->
                    <div class="flex justify-center">

                        <div class="w-[340px]">

                            <!-- Chat Card -->
                            <div class="bg-[#D4D4D6]
                        rounded-[20px]
                        h-[260px]">
                            </div>

                            <!-- Bottom Controls -->
                            <div class="flex gap-3 mt-3">

                                <div class="w-12 h-12
                            rounded-full
                            bg-[#A7A5A5]">
                                </div>

                                <div class="w-12 h-12
                            rounded-full
                            bg-[#A7A5A5]">
                                </div>

                                <div class="flex-1
                            rounded-[12px]
                            bg-[#BEBEBE]
                            h-12">
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </section>
    </main>
</body>

</html>
