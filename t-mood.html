<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-MOOD</title>
    <link rel="stylesheet" href="./assets/CSS/output.css">
    <link rel="stylesheet" href="./assets/CSS/global.css">
</head>

<body>
    <!-- Navbar -->
     <nav class="bg-[#F0EEE9] sticky top-0 z-50 shadow-sm">
        <div class="flex justify-between items-center h-20 px-5 sm:px-10 lg:px-15 text-[#414944]">

            <div class="flex items-center gap-1.5">
                <img src="./assets/images/landing/logo.png" alt="Your-Friend" class="h-10 w-10 sm:h-14 sm:w-14" />
                <h1 class="text-2xl sm:text-3xl font-bold font-titan">Y-Friend</h1>
            </div>

            <ul class="hidden md:flex gap-8 lg:gap-16 text-base lg:text-lg">
                <li><a href="" class="hover:text-[#4E755F] transition-colors">Beranda</a></li>
                <li><a href="./t-mood.html" class="hover:text-[#4E755F] transition-colors">T-Mood</a></li>
                <li><a href="" class="hover:text-[#4E755F] transition-colors">Mulai-Belajar</a></li>
                <li><a href="#" class="hover:text-[#4E755F] transition-colors">Suasana-Tenang</a></li>
            </ul>

            <div class="flex items-center gap-4">
                <div class="flex gap-1.5 items-center">
                    <img src="./assets/images/landing/globe.png" alt="globe" class="h-7 w-7 " />
                    <h2 class="text-base font-semibold hidden sm:block">Bahasa</h2>
                </div>

                <button id="menu-btn" class="md:hidden flex flex-col gap-1.5 p-1" aria-label="Toggle menu">
                    <span class="line block w-7 h-1 bg-[#414944] rounded"></span>
                    <span class="line block w-7 h-1 bg-[#414944] rounded"></span>
                    <span class="line block w-7 h-1 bg-[#414944] rounded"></span>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="lg:hidden bg-[#F0EEE9] border-t border-[#d5d3ce]">
            <ul class="flex flex-col text-[#414944] text-base font-semibold px-6 py-4 gap-4">
                <li><a href="" class="block py-1 hover:text-[#4E755F]">Beranda</a></li>
                <li><a href="./t-mood.html" class="block py-1 hover:text-[#4E755F]">T-Mood</a></li>
                <li><a href="#" class="block py-1 hover:text-[#4E755F]">Mulai-Belajar</a></li>
                <li><a href="#" class="block py-1 hover:text-[#4E755F]">Suasana-Tenang</a></li>
            </ul>
        </div>
    </nav>


    <main>
        <section class="relative overflow-hidden min-h-screen">

            <div class="relative z-10 container mx-auto px-10 py-16">

                <h2 class="text-center text-2xl font-bold text-[#33433B] mb-16">
                    Bagaimana perasaanmu hari ini?
                </h2>

                <div class="grid grid-cols-[1fr_1fr] items-center ">

                    <div class="relative flex justify-center items-center">

                        <img src="./assets/images/character/Normal.png " alt=""
                            class="absolute left-0 w-32 blur-[2px] opacity-80">

                        <div class="absolute w-[350px] h-[350px]
                    bg-yellow-300/40
                    rounded-full
                    blur-[80px]">
                        </div>

                        <img src="./assets/images/character/Happy.png" alt="" class="relative z-10 w-[260px]">
                    </div>

                    <div class="flex justify-center">

                        <div class="w-[340px]">

                            <div class="bg-[#D4D4D6]
                        rounded-[20px]
                        h-[260px]">
                            </div>

                            <div class="flex gap-3 mt-3">

                                <div class="w-12 h-12
                            rounded-full
                            bg-[#A7A5A5]">
                                </div>

                                <div class="w-12 h-12
                            rounded-full
                            bg-[#A7A5A5]">
                                </div>

                                <div class="flex-1
                            rounded-[12px]
                            bg-[#BEBEBE]
                            h-12">
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </section>
    </main>

    <script>
        const btn = document.getElementById('menu-btn');
        const menu = document.getElementById('mobile-menu');
        btn.addEventListener('click', () => {
            btn.classList.toggle('active');
            menu.classList.toggle('open');
        });
    </script>
</body>

</html>
