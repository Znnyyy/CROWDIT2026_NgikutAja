<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Y-Friend — Masuk</title>
  <link rel="stylesheet" href="../assets/CSS/output.css" />
  <link rel="stylesheet" href="../assets/CSS/global.css" />
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .input-field:focus {
      outline: none;
      border-color: #2D5A3D;
      box-shadow: 0 0 0 3px rgba(45, 90, 61, .14);
      background: #fff;
    }

    /* Desktop height-based scaling to prevent overflow and keep panels aligned */
    @media (min-width: 768px) {
      .login-container {
        height: 90vh !important;
        max-height: 800px !important;
        min-height: 650px !important;
      }
    }

    @media (min-width: 768px) and (max-height: 800px) {
      .login-container {
        min-height: 580px !important;
      }
      .right-panel {
        padding-top: 1.5rem !important;
        padding-bottom: 1.5rem !important;
        padding-left: 3.5rem !important;
        padding-right: 3.5rem !important;
        gap: 1.25rem !important;
      }
      .right-panel h1 {
        font-size: 2.75rem !important;
      }
      .right-panel p {
        font-size: 0.95rem !important;
      }
      .right-panel .font-titan.text-xl {
        font-size: 1.5rem !important;
      }
      .right-panel form {
        gap: 0.75rem !important;
      }
      .right-panel input, .right-panel button {
        padding-top: 0.625rem !important;
        padding-bottom: 0.625rem !important;
        font-size: 0.95rem !important;
      }
    }

    @media (min-width: 768px) and (max-height: 700px) {
      .login-container {
        min-height: 520px !important;
        height: 95vh !important;
      }
      .right-panel {
        padding-top: 1rem !important;
        padding-bottom: 1rem !important;
        padding-left: 2.5rem !important;
        padding-right: 2.5rem !important;
        gap: 0.875rem !important;
      }
      .right-panel h1 {
        font-size: 2.25rem !important;
      }
      .right-panel p {
        font-size: 0.875rem !important;
      }
      .right-panel .font-titan.text-xl {
        font-size: 1.25rem !important;
      }
      .right-panel form {
        gap: 0.5rem !important;
      }
      .right-panel input, .right-panel button {
        padding-top: 0.5rem !important;
        padding-bottom: 0.5rem !important;
        font-size: 0.875rem !important;
      }
      .right-panel label {
        font-size: 0.875rem !important;
      }
      .right-panel .a4 {
        margin-top: 0.125rem !important;
        margin-bottom: 0.125rem !important;
      }
    }

    @media (min-width: 768px) and (max-height: 600px) {
      .login-container {
        min-height: 460px !important;
        height: 98vh !important;
      }
      .right-panel {
        padding-top: 0.75rem !important;
        padding-bottom: 0.75rem !important;
        padding-left: 2rem !important;
        padding-right: 2rem !important;
        gap: 0.625rem !important;
      }
      .right-panel h1 {
        font-size: 1.75rem !important;
      }
      .right-panel p {
        font-size: 0.8rem !important;
        margin-top: 0rem !important;
      }
      .right-panel .font-titan.text-xl {
        font-size: 1.1rem !important;
      }
      .right-panel form {
        gap: 0.375rem !important;
      }
      .right-panel input, .right-panel button {
        padding-top: 0.4rem !important;
        padding-bottom: 0.4rem !important;
        font-size: 0.8rem !important;
      }
      .right-panel label {
        font-size: 0.8rem !important;
      }
      .right-panel .a5 {
        font-size: 0.8rem !important;
      }
    }
  </style>
</head>

<body class="min-h-screen bg-white flex items-baseline md:items-center justify-center">

  <div
    class="login-container w-full max-w-[1300px] rounded-3xl overflow-hidden flex flex-col md:flex-row h-full ">

    <div
      class="left-panel relative bg-[#F5E6D8] overflow-hidden shrink-0 rounded-t-3xl rounded-b-4xl md:rounded-t-none md:rounded-l-3xl w-full md:w-[46%] md:max-h-none max-h-15 md:justify-normal justify-center md:min-h-0 flex flex-col">

      <div class="relative z-10 flex items-center gap-2 p-5">
        <img src="../assets/images/login/logo.png" alt="Y-Friend Logo" class="w-auto h-10 sm:h-16 md:h-20" />
      </div>

      <div class="animate-[fadeUp_.5s_.2s_ease_both] absolute bottom-0 left-0 -translate-x-1/2 md:translate-x-0 md:right-0 flex items-end z-0">
        <img src="../assets/images/login/character.png" alt="Y-Friend Character"
          class="md:w-100 h-auto select-none drop-shadow-xl md:inline hidden" />
      </div>
    </div>

    <!-- char mobile -->
    <div class="absolute bottom-50 z-1 left-5 -translate-x-1/2 md:translate-x-0 md:right-0 flex items-end ">
      <img src="../assets/images/login/charfull.png" alt="Y-Friend Character"
        class="w-30 h-auto select-none drop-shadow-xl md:hidden inline" />
    </div>

    <div class="right-panel flex-1 flex flex-col justify-center gap-5 md:gap-7 px-6 py-8 md:px-16 ">
    
      <div class="animate-[fadeUp_.5s_.2s_ease_both]">
        <h1 class="font-titan text-4xl md:text-6xl leading-tight text-[#2D5A3D]">
          Selamat datang!
        </h1>
        <p class="font-titan text-xl md:text-3xl text-[#C9732A] mt-1">
          Yuk, masuk ke akunmu
        </p>
        <p class="text-gray-400 text-base mt-2 leading-relaxed">
          Ayok Masuk ke akunmu, untuk mengakses kemampuan Y-Friend.
        </p>
      </div>

      <form class="flex flex-col gap-4 a2">

        <div class="flex flex-col gap-1.5">
          <label class="text-base font-semibold text-gray-700">Email atau Username</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </span>
            <input type="text"
              class="input-field w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-base text-gray-700 placeholder-gray-400 transition-all duration-200"
              placeholder="Masukan e-mail atau username" />
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-base font-semibold text-gray-700">Kata Sandi</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </span>
            <input type="password" id="pw"
              class="input-field w-full pl-10 pr-10 py-3 border border-gray-200 rounded-xl bg-gray-50 text-base text-gray-700 placeholder-gray-400 transition-all duration-200"
              placeholder="Masukan kata sandi" />
            <button title="Show Password" type="button" onclick="togglePw()"
              class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
              <i id="eye-show" data-lucide="eye" class="w-4 h-4"></i>
              <i id="eye-hide" data-lucide="eye-off" class="w-4 h-4 hidden"></i>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between -mt-1">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" class="w-4 h-4 rounded checked:bg-[#2D5A3D]" />
            <span class="text-base text-gray-500">Ingat saya</span>
          </label>
          <a href="#" class="text-base font-semibold text-[#2D5A3D] hover:underline">Lupa kata sandi?</a>
        </div>

        <button type="button" onclick="login()"
          class="a3 font-titan w-full flex items-center justify-center gap-2 bg-[#2D5A3D] hover:bg-[#3a7a52] active:scale-[.98] text-white text-base tracking-wide py-3.5 rounded-xl border-none cursor-pointer shadow-md shadow-[#2D5A3D]/30 transition-all duration-200">
          Masuk
          <i data-lucide="log-in" class="w-5 h-5"></i>
        </button>

        <div class="a4 flex items-center gap-3 text-xs text-gray-400 whitespace-nowrap">
          <span class="flex-1 h-px bg-gray-200"></span>
          atau masuk dengan
          <span class="flex-1 h-px bg-gray-200"></span>
        </div>

        <button type="button"
          class="a4 w-full flex items-center justify-center gap-2.5 bg-white hover:bg-gray-50 active:scale-[.98] text-gray-700 font-semibold text-base py-3.5 rounded-xl border border-gray-200 cursor-pointer transition-all duration-200">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"
            class="w-5 h-5 shrink-0" />
          Lanjutkan dengan Google
        </button>

      </form>

      <p class="a5 text-center text-base text-gray-400">
        Belum punya akun?
        <a href="register.html" class="font-bold text-[#2D5A3D] hover:underline">Daftar Gratis</a>
      </p>

    </div>

  </div>

  <script src="/assets/JS/login.js"></script>
</body>

</html>
