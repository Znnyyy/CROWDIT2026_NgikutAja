<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Y-Friend — Daftar</title>
  <link rel="stylesheet" href="../assets/CSS/output.css" />
  <link rel="stylesheet" href="../assets/CSS/global.css" />
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    .input-field:focus {
      outline: none;
      border-color: #2D5A3D;
      box-shadow: 0 0 0 3px rgba(45, 90, 61, .14);
      background: #fff;
    }
  </style>
</head>

<body >

  <div class="w-full min-h-screen bg-[#F0EEE9] rounded-3xl shadow-2xl shadow-black/10 overflow-hidden flex flex-col md:flex-row ">

    <div class="flex-1 flex flex-col justify-center gap-4 px-6 py-5.5 sm:px-10 md:px-12 xl:px-14 order-2 md:order-1">

      <div class="a1">
        <h1 class="font-titan text-4xl md:text-6xl leading-tight text-[#2D5A3D]">Selamat datang!</h1>
        <p class="font-titan text-xl md:text-2xl text-[#C9732A] mt-1">Yuk, gabung sekarang!</p>
        <p class="text-gray-400 text-base mt-2 leading-relaxed">Bikin akunmu sekarang biar Kamu bisa akses Y-Friend!</p>
      </div>

      
      <!-- <div class="absolute top-10 -right-10 z-10 md:translate-x-0 md:right-10 flex items-end "> -->
    <div class="absolute bottom-0 z-10 left-10 -translate-x-1/2 md:translate-x-0 md:right-0 flex items-end ">
        <img src="../assets/images/login/charfull.png" alt="Y-Friend Character"
          class="w-38 h-auto select-none drop-shadow-xl md:hidden inline" />
      </div>
      <form class="flex flex-col gap-2 a2">

        <div class="flex flex-col gap-1.5">
          <label class="text-base font-semibold text-gray-700">Nama</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400">
              <i data-lucide="user" class="w-4 h-4"></i>
            </span>
            <input type="text"
              class="input-field w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-base text-gray-700 placeholder-gray-400 transition-all duration-200"
              placeholder="Masukan nama" />
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-base font-semibold text-gray-700">Email</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </span>
            <input type="email"
              class="input-field w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 text-base text-gray-700 placeholder-gray-400 transition-all duration-200"
              placeholder="Masukan e-mail" />
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-base font-semibold text-gray-700">Kata Sandi</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </span>
            <input type="password" id="pw1"
              class="input-field w-full pl-10 pr-10 py-3 border border-gray-200 rounded-xl bg-gray-50 text-base text-gray-700 placeholder-gray-400 transition-all duration-200"
              placeholder="Masukan kata sandi" />
            <button title="Show Password" type="button" onclick="togglePw('pw1','eye1-show','eye1-hide')"
              class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
              <i id="eye1-show" data-lucide="eye" class="w-4 h-4"></i>
              <i id="eye1-hide" data-lucide="eye-off" class="w-4 h-4 hidden"></i>
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-base font-semibold text-gray-700">Konfirmasi Kata Sandi</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-gray-400">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </span>
            <input type="password" id="pw2"
              class="input-field w-full pl-10 pr-10 py-3 border border-gray-200 rounded-xl bg-gray-50 text-base text-gray-700 placeholder-gray-400 transition-all duration-200"
              placeholder="Masukan ulang kata sandi" />
            <button title="Show Password" type="button" onclick="togglePw('pw2','eye2-show','eye2-hide')"
              class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
              <i id="eye2-show" data-lucide="eye" class="w-4 h-4"></i>
              <i id="eye2-hide" data-lucide="eye-off" class="w-4 h-4 hidden"></i>
            </button>
          </div>
        </div>

        <a href="./login.html"
          class="a3 font-titan w-full flex items-center justify-center gap-2 bg-[#2D5A3D] hover:bg-[#3a7a52] active:scale-[.98] text-white text-base tracking-wide py-3 rounded-xl border-none cursor-pointer shadow-md shadow-[#2D5A3D]/30 transition-all duration-200 mt-1">
          Daftar
          <i data-lucide="user-plus" class="w-5 h-5"></i>
        </a>

        <div class="a4 flex items-center gap-3 text-xs text-gray-400 whitespace-nowrap">
          <span class="flex-1 h-px bg-gray-500"></span>
          atau daftar dengan
          <span class="flex-1 h-px bg-gray-500"></span>
        </div>

        <button type="button"
          class="a4 w-full flex items-center justify-center gap-2.5 bg-white hover:bg-gray-50 active:scale-[.98] text-gray-700 font-semibold text-base py-3.5 rounded-xl border border-gray-200 cursor-pointer transition-all duration-200">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"
            class="w-5 h-5 shrink-0" />
          Lanjutkan dengan Google
        </button>

      </form>

      <p class="a5 text-center text-base text-gray-400">
        Sudah punya akun?
        <a href="login.html" class="font-bold text-[#2D5A3D] hover:underline">Masuk</a>
      </p>

    </div>

    <div
      class="relative bg-white overflow-hidden shrink-0 rounded-b-3xl md:rounded-b-none md:rounded-r-3xl w-full md:w-[42%] max-h-10 md:max-h-full md:justify-normal justify-center md:min-h-0 flex flex-col order-1 md:order-2">

      <div class="relative z-10 flex items-center gap-2 p-5">
        <img src="../assets/images/login/logo.png" alt="Y-Friend Logo" class="w-auto h-10 sm:h-14 md:h-16" />
      </div>
      <div class="absolute bottom-0  -translate-x-1/2 left-0 md:translate-x-0 md:right-0 flex items-center z-0">
        <img src="../assets/images/login/character.png" alt="Y-Friend Character"
          class="w-100 h-auto md:inline hidden drop-shadow-xl" />
      </div>

    </div>

  </div>

  <script>
    lucide.createIcons();

    function togglePw(inputId, showId, hideId) {
      const pw = document.getElementById(inputId);
      const show = document.getElementById(showId);
      const hide = document.getElementById(hideId);
      const isHidden = pw.type === 'password';
      pw.type = isHidden ? 'text' : 'password';
      show.classList.toggle('hidden', isHidden);
      hide.classList.toggle('hidden', !isHidden);
    }
  </script>
</body>

</html>
